<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Agent Loop Audit</title>
  <link rel="stylesheet" href="/style.css">
</head>
<body>
  <div id="app">
    <aside id="sidebar">
      <div class="sidebar-header">
        <h1>Agent Loop</h1>
        <button id="new-session-btn" class="btn btn-primary btn-sm">+ New Session</button>
        <input id="search" type="text" placeholder="Filter sessions...">
      </div>
      <ul id="session-list"></ul>
    </aside>
    <main id="main-panel">
      <div id="empty-state">
        <p>Select a session to inspect</p>
      </div>
      <div id="session-detail" hidden>
        <div class="timeline-search">
          <input id="timeline-search-input" type="text" placeholder="Search timeline (Enter = next, Shift+Enter = prev, Esc = clear)">
          <span id="timeline-search-count" class="timeline-search-count">0 / 0</span>
          <button id="timeline-search-prev" class="btn btn-default btn-sm" type="button" title="Previous match (Shift+Enter)">&#9650;</button>
          <button id="timeline-search-next" class="btn btn-default btn-sm" type="button" title="Next match (Enter)">&#9660;</button>
          <button id="timeline-search-clear" class="btn btn-default btn-sm" type="button">Clear</button>
        </div>
        <header id="session-header"></header>
        <div id="timeline"></div>
      </div>
    </main>
  </div>
  <script src="/app.js"></script>
</body>
</html>

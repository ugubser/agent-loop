model:
  provider: lmstudio
  model: gpt-oss-120b-F16.gguf
  maxTokens: 8192
  baseUrl: http://spark:8080/v1

session:
  maxContext: 32000       # Local models have smaller context windows
  checkpointInterval: 5
  timeout: 21600

skills:
  dirs:
    - ./skills

persistence:
  backend: file
  dir: ./sessions

tools:
  cli:
    allowedCommands:
      - agent-browser
      - bash
      - curl
      - jq
      - grep
      - python3
      - /home/ugubser/Github/Arcos-Issuance-LibreChat-PoC/ecofin-mcp/venv/bin/python
      - echo
      - cat
      - tee
    timeout: 120

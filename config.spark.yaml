model:
  provider: lmstudio
  model: nemotron-3-super
  maxTokens: 32768
  baseUrl: http://spark:8080/v1
  requestTimeout: 600000   # 10 minutes

session:
  maxContext: 131000      # Model supports 131K context
  checkpointInterval: 5
  timeout: 600000
  maxSteps: 60

skills:
  dirs:
    - ./skills
    - /home/ugubser/Github/ecofin-mcp-graph/ecofin-mcp/skills
persistence:
  backend: file
  dir: ./sessions

tools:
  cli:
    allowedCommands:
      - agent-browser
      - bash
      - bun
      - curl
      - jq
      - grep
      - python3
      - /home/ugubser/Github/Arcos-Issuance-LibreChat-PoC/ecofin-mcp/venv/bin/python
      - echo
      - cat
      - tee
    timeout: 120

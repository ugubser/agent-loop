model:
  provider: openai-compat
  model: gpt-5.3-codex
  maxTokens: 200000
  baseUrl: http://localhost:8888/v1
  apiKey: pwd

session:
  maxContext: 1000000     # Codex supports 1M context
  checkpointInterval: 5
  timeout: 21600
  maxSteps: 60

skills:
  dirs:
    - ./skills

persistence:
  backend: file
  dir: ./sessions

tools:
  cli:
    allowedCommands:
      - agent-browser
      - bash
      - bun
      - curl
      - jq
      - grep
      - python3
      - /home/ugubser/Github/Arcos-Issuance-LibreChat-PoC/ecofin-mcp/venv/bin/python
      - echo
      - cat
      - tee
    timeout: 120
